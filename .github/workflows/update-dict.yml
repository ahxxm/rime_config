name: update-dict

on:
  schedule:
    - cron: "30 0 */1 * *"
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit Message"
        type: string
        required: false

permissions:
  contents: write

jobs:
  update-dict-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          show-progress: true
      - name: Fetch and Download Latest zhwiki.dict.yaml
        run: |
          latest_asset=$(curl -s https://api.github.com/repos/felixonmars/fcitx5-pinyin-zhwiki/releases/tags/0.3.0 \
          | jq -r '.assets[] | select(.name | test("zhwiki-[0-9]{8}\\.dict")) | .browser_download_url' \
          | sort -r | head -n 1)
          wget "$latest_asset" -O zhwiki.dict.yaml
      - name: Get latest mw2fcitx release
        id: moegirl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release=$(gh release view --repo outloudvi/mw2fcitx --json tagName --jq '.tagName')
          echo "release=$release" >> "$GITHUB_OUTPUT"
      - name: Add files to git
        id: add_files
        run: |
          git config user.name "ahxxm[rime-bot]"
          git config user.email "rime-bot@ahxxm.com"
          wget -O moegirl.dict.yaml "https://github.com/outloudvi/mw2fcitx/releases/download/${{ steps.moegirl.outputs.release }}/moegirl.dict.yaml"
          git add .
          commit_msg="${{ github.event.inputs.commit_message }} - update dictionary"
          git commit -m "$commit_msg" || echo "nothing to commit"
          git pull origin $(git rev-parse --abbrev-ref HEAD) --unshallow --rebase
      - name: Push changes
        run: git push origin HEAD:$(git rev-parse --abbrev-ref HEAD)
